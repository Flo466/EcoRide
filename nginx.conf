server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is the magic line for routing
        try_files $uri $uri/ /index.html;
    }

    # Optional: Handle static assets (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}