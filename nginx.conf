server {
    listen 80;
    server_name www.ecoride-pro.uk ecoride-pro.uk localhost;

    # --- 1. PRIORITÉ AUX ASSETS STATIQUES (Images, JS, CSS) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /usr/share/nginx/html;
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public";
    }

    # --- 2. ROUTE DÉDIÉE À L'API (SYMFONY) ---
    # On isole tout ce qui commence par /api ou /doc
    location ~ ^/(api|doc|index\.php)(/|$) {
        root /var/www/html/public;
        fastcgi_pass symfony_backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # --- 3. TOUT LE RESTE VA AU FRONTEND ---
    # C'est ici qu'on bloque l'accès de Symfony aux routes de ton site
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Si le fichier n'existe pas (ex: /covoiturages), on force l'index.html
        # SANS jamais passer par index.php
        try_files $uri $uri/ /index.html;
    }

    # --- SÉCURITÉ ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;
    client_max_body_size 10M;
}