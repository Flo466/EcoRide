services:
  ##########################################################################
  # DATABASE SERVICE - MYSQL
  ##########################################################################
  ecoride_db:
    image: mysql:8.0
    container_name: ecoride_db
    restart: always # Ensures DB restarts on server reboot
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - symfony

  ##########################################################################
  # DATABASE GUI - PHPMYADMIN
  ##########################################################################
  phpmyadmin:
    image: phpmyadmin
    container_name: ecoride_pma
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=ecoride_db
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    networks:
      - symfony
    depends_on:
      ecoride_db:
        condition: service_healthy

  ##########################################################################
  # FRONTEND SERVICE - NGINX (Act as Reverse Proxy)
  ##########################################################################
  ecoride_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoride_frontend
    restart: always
    ports:
      - "80:80" # Exposed to the internet (or Cloudflare)
    volumes:
      # Map the shared avatar volume so Nginx can serve images directly
      - avatars_data:/var/www/html/public/uploads/avatars:ro
    networks:
      - symfony
    depends_on:
      - symfony_backend

  ##########################################################################
  # BACKEND SERVICE - SYMFONY (PHP-FPM)
  ##########################################################################
  symfony_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: symfony_backend
    restart: always
    env_file:
      - .env
    # No ports exposed here! Nginx talks to FPM via the internal network on port 9000
    volumes:
      - ./backend:/var/www/html
      - symfony_vendor_cache:/var/www/html/vendor
      - symfony_var_cache:/var/www/html/var
      # Shared volume for profile pictures
      - avatars_data:/var/www/html/public/uploads/avatars
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: ${APP_ENV}
      APP_SECRET: ${APP_SECRET}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      ecoride_db:
        condition: service_healthy
    networks:
      - symfony

volumes:
  db_data:
  symfony_vendor_cache:
  symfony_var_cache:
  avatars_data: # Crucial for persisting user-uploaded photos

networks:
  symfony: