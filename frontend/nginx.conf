server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- FRONTEND ROUTING ---
    # Handle Single Page Application (SPA) routing
    # Redirect all non-file requests to index.html for the JS Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND PROXY (SYMFONY) ---
    # Route all requests starting with /api to the PHP-FPM container
    location ~ ^/api/ {
        # 'symfony_backend' must match the service name in docker-compose.yml
        fastcgi_pass symfony_backend:9000;
        include fastcgi_params;
        
        # Absolute path to the index.php inside the PHP container
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # --- UPLOADS & MEDIA ---
    # Serve user-uploaded files (like avatars) directly through Nginx
    location /uploads/ {
        # Points to the shared volume between Nginx and PHP containers
        alias /var/www/html/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # --- STATIC ASSETS OPTIMIZATION ---
    # Cache settings for common static file types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public";
    }

    # --- SECURITY ---
    # Deny access to hidden files (e.g., .env, .git)
    location ~ /\. {
        deny all;
    }
}